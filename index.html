<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title & Logo -->
    <title>Login page</title>
    <link
      rel="shortcut icon"
      href="./images/github-logo.png"
      type="image/x-icon"
    />

    <!-- Add Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] flex items-center justify-center h-screen p-4">
    <div
      class="bg-[#FFFFFF] p-6 md:p-8 rounded-lg shadow-lg w-11/12 max-w-[520px]"
    >
      <!-- Logo -->
      <div class="logo mx-2">
        <div class="flex justify-center m-4">
          <img class="w-20 h-20" src="./images/github-logo.png" alt="" />
        </div>

        <h1 class="text-2xl font-semibold text-center text-[#1F2937]">
          GitHub Issues Tracker
        </h1>
        <p class="text-[#64748B] text-center mb-6">
          Sign in to manage your issues
        </p>
      </div>

      <!-- Username -->
      <div class="username">
        <label class="label">
          <span class="text-[#1F2937] font-medium text-[16px]">Username</span>
        </label>

        <input
          id="username"
          type="text"
          placeholder="Enter Username"
          class="border-[#dde1e6] w-full border p-3 rounded mb-3"
        />
        <p class="text-[#4A00FF] text-[14px] mb-4">Default: admin</p>
      </div>

      <!-- Password -->

      <div class="password">
        <label class="label">
          <span class="text-[#1F2937] font-medium text-[16px]">Password</span>
        </label>

        <input
          id="password"
          type="password"
          placeholder="Enter Password"
          class="border-[#dde1e6] w-full border p-3 rounded mb-3"
        />
        <p class="text-[#4A00FF] text-[14px] mb-4">Default: admin123</p>
      </div>

      <!-- Sign in button -->
      <button
        onclick="login()"
        class="w-full bg-[#4A00FF] text-white font-semibold text-[16px] p-2 rounded hover:bg-blue-600 mb-3"
      >
        Sign In
      </button>

      <div class="flex justify-center items-center p-1 gap-4 my-4">
        <div class="flex-grow border-t border-gray-600"></div>
        <p class="font-medium text-lg text-gray-600">Or</p>
        <div class="flex-grow border-t border-gray-600"></div>
      </div>

      <!-- Credential -->
      <div class="flex justify-center mb-4">
        <!-- <div>or</div> -->
        <div>
          <p
            class="text-[#64748B] grid justify-center font-medium text-[16px] mb-3"
          >
            Demo Credentials:
          </p>
          <div class="bg-[#F8FAFC] w-[456px] grid justify-center">
            <p>
              <span class="font-semibold text-[16] text-[#1F2937]"
                >Username:</span
              >
              admin
            </p>
            <p>
              <span class="font-semibold text-[16] text-[#1F2937]"
                >Password:</span
              >
              admin123
            </p>
          </div>
        </div>
      </div>

      <!-- ***************** -->

      <script src="./login.js"></script>
    </div>
  </body>
</html>
