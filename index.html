<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title & logo -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./images/github-logo.png"
      type="image/x-icon"
    />

    <!-- Add Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header>
      <!-- Navbar -->
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl">
            <img class="w-9" src="./images/github-logo.png" alt="" />GitHub
            Issues Tracker</a
          >
        </div>

        <div class="flex gap-2">
          <input
            id="searchInput"
            class="border border-[#c2c5ca] px-3 py-1 rounded"
            placeholder="Search issues..."
          />

          <button
            id="searchBtn"
            class="bg-purple-600 text-white px-4 py-1 rounded"
          >
            + New Issues
          </button>
        </div>
      </div>
    </header>
    <!-- body -->
    <section>
      <div class="max-w-5xl mx-auto p-6">
        <!-- Buttons -->
        <div
          class="bg-yellow-50 flex items-center pl-6 gap-3 mb-4 h-[80px] rounded"
        >
          <!-- all -->
          <button
            id="allBtn"
            class="tab bg-purple-600 text-white px-4 py-1 rounded w-[100px] h-[30px]"
          >
            All
          </button>

          <!-- open -->
          <button
            id="openBtn"
            class="tab border border-[#c2c5ca] px-4 py-1 rounded w-[100px] h-[30px]"
          >
            Open
          </button>

          <!-- closed  -->
          <button
            id="closed"
            class="tab border border-[#c2c5ca] px-4 py-1 rounded w-[100px] h-[30px]"
          >
            Closed
          </button>
        </div>
      </div>
    </section>

    <!-- *********** javaScript ********* -->
    <script src="./script.js"></script>
  </body>
</html>
