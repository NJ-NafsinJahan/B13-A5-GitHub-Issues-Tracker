<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title & logo -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./images/github-logo.png"
      type="image/x-icon"
    />

    <!-- Add Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind + DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- navbar -->

    <nav
      class="bg-white shadow p-6 flex justify-between items-center flex-col md:flex-row md:justify-between md:items-center gap-3"
    >
      <div class="flex items-center gap-2">
        <img class="w-8" src="./images/github-logo.png" alt="" />
        <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
      </div>

      <div class="flex gap-2">
        <input
          id="searchInput"
          class="border border-gray-200 px-3 py-1 rounded"
          placeholder="Search issues"
        />

        <button
          id="searchBtn"
          class="bg-purple-600 text-white px-4 py-1 rounded"
        >
          + New Issue
        </button>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
      <!-- btn -->

      <div class="bg-white flex gap-3 mb-8 p-3 h-15 rounded">
        <button
          id="allBtn"
          class="tab bg-purple-600 text-white px-6 py-1 rounded"
        >
          All
        </button>

        <button id="openBtn" class="tab bg-gray-200 px-4 py-1 rounded">
          Open
        </button>

        <button id="closedBtn" class="tab bg-gray-200 px-4 py-1 rounded">
          Closed
        </button>
      </div>

      <!-- ************* -->

      <div
        class="flex bg-white mb-8 p-3 h-19 rounded justify-between items-center"
      >
        <div class="flex gap-2 justify-between items-center">
          <img class="w-8 h-8" src="./images/Aperture.png" alt="" />
          <div>
            <h2 id="issueCount" class="text-lg font-semibold md:text-xl mb-0.5">
              0 Issues
            </h2>
            <p class="text-[#64748B] text-sm md:text-xs">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="flex gap-4 md:gap-6">
          <p class="text-sm md:text-base">
            <span class="${icon} text-green-600 text-sm md:text-xl">●</span>Open
          </p>
          <p class="text-sm md:text-base">
            <span class="${icon} text-purple-600 text-sm md:text-xl">●</span
            >Closed
          </p>
        </div>
      </div>

      <!-- ************** -->

      <div id="loader" class="text-center hidden">Loading...</div>

      <div
        id="issuesContainer"
        class="bg-white grid md:grid-cols-2 lg:grid-cols-4 gap-4"
      ></div>
    </div>

    <!-- modal -->

    <div
      id="modal"
      class="fixed inset-0 bg-black/40 hidden items-center justify-center"
    >
      <div class="bg-white p-6 rounded w-96">
        <div id="modalContent"></div>

        <div class="grid justify-items-end">
          <button
            onclick="closeModal()"
            class="mt-4 bg-purple-600 text-white px-4 py-1 rounded"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <!-- js -->
    <script src="./script.js"></script>
  </body>
</html>
